# ticks
tickPeriod: 50
hideRecomputeCooldownTicks: 20
approachTargetCooldownTicks: 20
retreatRecomputeCooldownTicks: 10
loiterRecomputeCooldownTicks: 50

# Radius within which the player can be targeted for pranks
targetSearchRadius: 148.0
minDistance: 50
maxDistance: 150

# Player vision
freezeDotThreshold: 0.65   # чем больше, тем строже "смотрит"
requireLineOfSight: true

# Movement
approachSpeed: 1.15
observeSpeed: 0.80

# Prank settings
enablePranks: false
prankChancePerTick: 0.02
